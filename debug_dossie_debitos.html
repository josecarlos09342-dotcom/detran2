    <style>
        /* Estilo para centralizar o loader */
        .loader-container {
            display: none; /* Inicialmente oculto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(32, 115, 169, 0.6); /* Fundo azul escuro semi-transparente */
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .hidden {
            display: none;
        }

        .modal-header {
            border-bottom: none;
        }

        .modal-footer {
            border-top: none;
        }

        .modal-body {
            text-align: center;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #ffe6e6;
            margin: 0 auto 10px auto;
        }

            .icon-circle i {
                color: red;
                font-size: 20px;
                line-height: 50px;
            }

        .btn-custom {
            background-color: #d9534f;
            color: white;
            width: 100%;
        }

        .icone-negrito {
            -webkit-text-stroke: 0.2px;
        }
    </style>

    <script>
        function showErrorMessage(message) {
            $("#md_error_body").text(message);
            $("#md_error").modal('show');
        }

             function mostrarLoader() {
          // Mostra o carregador
          document.getElementById('loader').style.display = 'flex';
        }

        function esconderLoader() {
          // Esconde o carregador
          document.getElementById('loader').style.display = 'none';
        }
    </script>
</head>

<body translate="no">
    <div class="loader-container" id="loader">
        <div class="spinner-border" role="status">

    <div class="modal fade" id="md_error" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="md_error_label" aria-hidden="true">

            <div class="modal-content">

                    </div>
                    <h5 class="modal-title">Error</h5>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-custom" data-bs-dismiss="modal" aria-label="Close">OK</button>
                </div>
            </div>
        </div>
    </div>
